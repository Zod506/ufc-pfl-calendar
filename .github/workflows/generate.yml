name: Generate Calendar

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest -q

      - name: Run calendar generator
        run: python src/main.py

      - name: Commit calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/calendar.ics || true
          git commit -m "chore: update calendar.ics [skip ci]" || echo "no changes to commit"
          git push

      - name: Upload calendar artifact
        uses: actions/upload-artifact@v4
        with:
          name: calendar-ics
          path: output/calendar.ics

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
