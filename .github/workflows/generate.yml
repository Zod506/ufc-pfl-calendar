name: Generate Calendar

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # explicitly provide the token and persist credentials so pushes work
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -q

      - name: Generate calendar
        env:
          SPORTSDATA_API_KEY: ${{ secrets.SPORTSDATA_API_KEY }}
        run: python src/main.py

      - name: Prepare Pages content
        run: |
          mkdir site
          cp output/calendar.ics site/calendar.ics

      - name: Commit and open PR with calendar (debug)
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/calendar.ics
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update generated calendar"
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          BRANCH="generated/calendar-${SHORT_SHA}"
          git checkout -b "$BRANCH"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          echo "--- GIT STATUS ---" > commit_debug.txt
          git status --porcelain --branch >> commit_debug.txt 2>&1 || true
          echo "--- GIT LOG ---" >> commit_debug.txt
          git log -1 --pretty=fuller >> commit_debug.txt 2>&1 || true
          echo "--- GIT REMOTE ---" >> commit_debug.txt
          git remote -v >> commit_debug.txt 2>&1 || true
          echo "--- PUSH OUTPUT ---" >> commit_debug.txt
          set -x
          if git push -u origin "$BRANCH" >> commit_debug.txt 2>&1; then
            echo "push succeeded" >> commit_debug.txt
          else
            echo "push failed" >> commit_debug.txt
            cat commit_debug.txt
            exit 2
          fi
          set +x
          echo "--- CURL PR CREATE ---" >> commit_debug.txt
          HTTP=$(curl -s -w "%{http_code}" -o pr_response.txt -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\":\"chore: update generated calendar\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Automated calendar update generated by workflow.\"}") || true
          echo "PR HTTP STATUS: $HTTP" >> commit_debug.txt
          echo "PR RESPONSE:" >> commit_debug.txt
          cat pr_response.txt >> commit_debug.txt || true
          cat commit_debug.txt
      - name: Upload commit debug artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: commit-debug
          path: commit_debug.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4